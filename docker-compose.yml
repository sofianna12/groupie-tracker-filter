services:

  # ── 1. PostgreSQL database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       groupie
      POSTGRES_USER:     groupie
      POSTGRES_PASSWORD: groupie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groupie -d groupie"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 2. Go API backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DB_URL: postgres://groupie:groupie@postgres:5432/groupie?sslmode=disable
   
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── 3. Angular frontend (nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8080:80"   # ← όλα μέσω localhost:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: